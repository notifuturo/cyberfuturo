<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 595" width="420" height="595" role="img" aria-label="CyberFuturo handout — Chapter 00 — Welcome">
  <title>CyberFuturo · Chapter 00 · Welcome — your first file</title>
  <desc>Shareable handout for chapter 00 of the CyberFuturo course. Summarizes pwd, ls, echo, cat, and the &gt; operator on a single A5 card. Auto-filled with the student's name and completion date.</desc>
  <style>
    .bg    { fill: #1e1e2e; }
    .title { fill: #e879f9; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 22px; font-weight: 700; }
    .brand { fill: #e879f9; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; }
    .brandg{ fill: #50fa7b; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; font-weight: 700; }
    .h     { fill: #a5b4fc; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
    .cmd   { fill: #84cc16; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; }
    .gloss { fill: #cbd5e1; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; }
    .body  { fill: #cbd5e1; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; }
    .foot  { fill: #94a3b8; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 9px; }
    .hl    { fill: #8be9fd; }
    .divider { stroke: #3b3b4f; stroke-width: 1; }
  </style>

  <rect class="bg" width="420" height="595"/>

  <text x="20" y="38" class="brandg">&gt;_</text>
  <text x="34" y="38" class="brand">CyberFuturo · Chapter 00</text>

  <text x="20" y="72" class="title">Welcome.</text>
  <text x="20" y="92" class="body">One terminal, four commands, your first file.</text>

  <text x="20" y="124" class="h">the commands</text>
  <text x="20" y="144" class="cmd">pwd</text>
  <text x="130" y="144" class="gloss">where you are in the system</text>
  <text x="20" y="160" class="cmd">ls</text>
  <text x="130" y="160" class="gloss">list the current directory</text>
  <text x="20" y="176" class="cmd">echo "text" &gt; file</text>
  <text x="130" y="176" class="gloss">create file with text</text>
  <text x="20" y="192" class="cmd">cat file</text>
  <text x="130" y="192" class="gloss">print the contents</text>

  <text x="20" y="228" class="h">typical flow</text>
  <text x="20" y="248" class="body">1. pwd                 (where am I?)</text>
  <text x="20" y="264" class="body">2. ls                  (what's here?)</text>
  <text x="20" y="280" class="body">3. echo "hello world" &gt; hello.txt</text>
  <text x="20" y="296" class="body">4. cat hello.txt       (confirm)</text>

  <text x="20" y="332" class="h">the key: the &gt; operator</text>
  <text x="20" y="352" class="body">echo prints to screen. with &gt;</text>
  <text x="20" y="366" class="body">the output goes to the file.</text>
  <text x="20" y="380" class="body">&gt;  overwrites the file.</text>
  <text x="20" y="394" class="body">&gt;&gt; appends to the end.</text>

  <text x="20" y="430" class="h">the unix rule</text>
  <text x="20" y="450" class="body">do one thing, do it well,</text>
  <text x="20" y="464" class="body">combine it with other things.</text>

  <text x="20" y="500" class="h">pitfalls</text>
  <text x="20" y="520" class="gloss">✗ forgetting quotes in echo</text>
  <text x="20" y="536" class="gloss">✗ &gt; overwriting by mistake</text>

  <line x1="20" y1="554" x2="400" y2="554" class="divider"/>
  <text x="20" y="568" class="foot">Completed by <tspan class="hl">{{BUYER_NAME}}</tspan> · {{DATE}}</text>
  <text x="20" y="582" class="foot">cyberfuturo.com/en/course/00-bienvenido/  ·  $9 USD · lifetime · 4 languages</text>
</svg>
