<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 595" width="420" height="595" role="img" aria-label="Handout CyberFuturo — Capítulo 00 — Bienvenida">
  <title>CyberFuturo · Capítulo 00 · Bienvenida — tu primer archivo</title>
  <desc>Handout compartible del capítulo 00 del curso CyberFuturo. Resume pwd, ls, echo, cat y el operador &gt; en una sola tarjeta A5. Se rellena automáticamente con el nombre del alumno y la fecha.</desc>
  <style>
    .bg    { fill: #1e1e2e; }
    .title { fill: #e879f9; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 22px; font-weight: 700; }
    .brand { fill: #e879f9; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; }
    .brandg{ fill: #50fa7b; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; font-weight: 700; }
    .h     { fill: #a5b4fc; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
    .cmd   { fill: #84cc16; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; }
    .gloss { fill: #cbd5e1; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; }
    .body  { fill: #cbd5e1; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; }
    .foot  { fill: #94a3b8; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 9px; }
    .hl    { fill: #8be9fd; }
    .divider { stroke: #3b3b4f; stroke-width: 1; }
  </style>

  <rect class="bg" width="420" height="595"/>

  <text x="20" y="38" class="brandg">&gt;_</text>
  <text x="34" y="38" class="brand">CyberFuturo · Capítulo 00</text>

  <text x="20" y="72" class="title">Bienvenida.</text>
  <text x="20" y="92" class="body">Una terminal, cuatro comandos, tu primer archivo.</text>

  <text x="20" y="124" class="h">los comandos</text>
  <text x="20" y="144" class="cmd">pwd</text>
  <text x="130" y="144" class="gloss">dónde estás en el sistema</text>
  <text x="20" y="160" class="cmd">ls</text>
  <text x="130" y="160" class="gloss">lista el directorio actual</text>
  <text x="20" y="176" class="cmd">echo "texto" &gt; arch</text>
  <text x="130" y="176" class="gloss">crea archivo con texto</text>
  <text x="20" y="192" class="cmd">cat arch</text>
  <text x="130" y="192" class="gloss">imprime el contenido</text>

  <text x="20" y="228" class="h">flujo típico</text>
  <text x="20" y="248" class="body">1. pwd                (¿dónde estoy?)</text>
  <text x="20" y="264" class="body">2. ls                 (¿qué hay aquí?)</text>
  <text x="20" y="280" class="body">3. echo "hola mundo" &gt; hola.txt</text>
  <text x="20" y="296" class="body">4. cat hola.txt       (confirma)</text>

  <text x="20" y="332" class="h">la clave: el operador &gt;</text>
  <text x="20" y="352" class="body">echo imprime en pantalla. con &gt;</text>
  <text x="20" y="366" class="body">la salida va al archivo.</text>
  <text x="20" y="380" class="body">&gt;  sobrescribe el archivo.</text>
  <text x="20" y="394" class="body">&gt;&gt; añade al final.</text>

  <text x="20" y="430" class="h">regla de unix</text>
  <text x="20" y="450" class="body">haz una cosa, hazla bien,</text>
  <text x="20" y="464" class="body">combínala con otras cosas.</text>

  <text x="20" y="500" class="h">trampas</text>
  <text x="20" y="520" class="gloss">✗ olvidar las comillas en echo</text>
  <text x="20" y="536" class="gloss">✗ &gt; sobrescribir sin querer</text>

  <line x1="20" y1="554" x2="400" y2="554" class="divider"/>
  <text x="20" y="568" class="foot">Completado por <tspan class="hl">{{BUYER_NAME}}</tspan> · {{DATE}}</text>
  <text x="20" y="582" class="foot">cyberfuturo.com/es/curso/00-bienvenido/  ·  $9 USD · vitalicio · 4 idiomas</text>
</svg>
