<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 595" width="420" height="595" role="img" aria-label="Handout CyberFuturo — Chapitre 00 — Bienvenue">
  <title>CyberFuturo · Chapitre 00 · Bienvenue — ton premier fichier</title>
  <desc>Handout partageable du chapitre 00 du cours CyberFuturo. Résume pwd, ls, echo, cat et l'opérateur &gt; sur une seule carte A5. Rempli automatiquement avec le nom de l'étudiant et la date.</desc>
  <style>
    .bg    { fill: #1e1e2e; }
    .title { fill: #e879f9; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 22px; font-weight: 700; }
    .brand { fill: #e879f9; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; }
    .brandg{ fill: #50fa7b; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; font-weight: 700; }
    .h     { fill: #a5b4fc; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
    .cmd   { fill: #84cc16; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; }
    .gloss { fill: #cbd5e1; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; }
    .body  { fill: #cbd5e1; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 10px; }
    .foot  { fill: #94a3b8; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 9px; }
    .hl    { fill: #8be9fd; }
    .divider { stroke: #3b3b4f; stroke-width: 1; }
  </style>

  <rect class="bg" width="420" height="595"/>

  <text x="20" y="38" class="brandg">&gt;_</text>
  <text x="34" y="38" class="brand">CyberFuturo · Chapitre 00</text>

  <text x="20" y="72" class="title">Bienvenue.</text>
  <text x="20" y="92" class="body">Un terminal, quatre commandes, ton premier fichier.</text>

  <text x="20" y="124" class="h">les commandes</text>
  <text x="20" y="144" class="cmd">pwd</text>
  <text x="130" y="144" class="gloss">où tu es dans le système</text>
  <text x="20" y="160" class="cmd">ls</text>
  <text x="130" y="160" class="gloss">liste le répertoire actuel</text>
  <text x="20" y="176" class="cmd">echo "texte" &gt; fich</text>
  <text x="130" y="176" class="gloss">crée le fichier avec texte</text>
  <text x="20" y="192" class="cmd">cat fich</text>
  <text x="130" y="192" class="gloss">affiche le contenu</text>

  <text x="20" y="228" class="h">flux typique</text>
  <text x="20" y="248" class="body">1. pwd                    (où suis-je ?)</text>
  <text x="20" y="264" class="body">2. ls                     (qu'y a-t-il ?)</text>
  <text x="20" y="280" class="body">3. echo "bonjour monde" &gt; bonjour.txt</text>
  <text x="20" y="296" class="body">4. cat bonjour.txt        (confirme)</text>

  <text x="20" y="332" class="h">la clé : l'opérateur &gt;</text>
  <text x="20" y="352" class="body">echo affiche à l'écran. avec &gt;</text>
  <text x="20" y="366" class="body">la sortie va dans le fichier.</text>
  <text x="20" y="380" class="body">&gt;  écrase le fichier.</text>
  <text x="20" y="394" class="body">&gt;&gt; ajoute à la fin.</text>

  <text x="20" y="430" class="h">la règle unix</text>
  <text x="20" y="450" class="body">fais une chose, fais-la bien,</text>
  <text x="20" y="464" class="body">combine-la avec d'autres choses.</text>

  <text x="20" y="500" class="h">pièges</text>
  <text x="20" y="520" class="gloss">✗ oublier les guillemets dans echo</text>
  <text x="20" y="536" class="gloss">✗ &gt; écraser par erreur</text>

  <line x1="20" y1="554" x2="400" y2="554" class="divider"/>
  <text x="20" y="568" class="foot">Terminé par <tspan class="hl">{{BUYER_NAME}}</tspan> · {{DATE}}</text>
  <text x="20" y="582" class="foot">cyberfuturo.com/fr/cours/00-bienvenido/  ·  9 $ USD · à vie · 4 langues</text>
</svg>
