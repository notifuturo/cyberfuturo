# CyberFuturo — auto-deploy to Cloudflare Pages on every push to main
#
# Install:
#   mkdir -p .github/workflows
#   mv docs/github-workflow-deploy.yml.txt .github/workflows/deploy.yml
#   git add .github/workflows/deploy.yml
#   git commit -m "ci: auto-deploy to Cloudflare Pages on push to main"
#   git push
#
# If `git push` rejects the commit with:
#   "refusing to allow an OAuth App to create or update workflow..."
# then your gh token needs the 'workflow' scope:
#   gh auth refresh -s workflow
#
# Required secrets (set via: gh secret set <NAME>):
#   CLOUDFLARE_API_TOKEN   — token with Account / Cloudflare Pages / Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — 32-char hex, visible in CF dashboard sidebar
#
# See docs/operators-manual.md section 8 for full setup instructions.

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Basic smoke check
        run: |
          test -f site/pt/index.html              || { echo "site/pt/index.html missing"; exit 1; }
          test -f site/es/index.html              || { echo "site/es/index.html missing"; exit 1; }
          test -f site/en/index.html              || { echo "site/en/index.html missing"; exit 1; }
          test -f site/fr/index.html              || { echo "site/fr/index.html missing"; exit 1; }
          test -f site/pt/obrigado/index.html     || { echo "site/pt/obrigado/ missing"; exit 1; }
          test -f site/es/gracias/index.html      || { echo "site/es/gracias/ missing"; exit 1; }
          test -f site/en/thank-you/index.html    || { echo "site/en/thank-you/ missing"; exit 1; }
          test -f site/fr/merci/index.html        || { echo "site/fr/merci/ missing"; exit 1; }
          test -f site/pt/privacidade/index.html      || { echo "site/pt/privacidade/ missing"; exit 1; }
          test -f site/es/privacidad/index.html       || { echo "site/es/privacidad/ missing"; exit 1; }
          test -f site/en/privacy/index.html          || { echo "site/en/privacy/ missing"; exit 1; }
          test -f site/fr/confidentialite/index.html  || { echo "site/fr/confidentialite/ missing"; exit 1; }
          test -f site/_worker.js                 || { echo "root redirect _worker.js missing"; exit 1; }
          test -f site/styles.css                 || { echo "site/styles.css missing"; exit 1; }
          test -f site/favicon.svg                || { echo "site/favicon.svg missing"; exit 1; }
          test -f site/sitemap.xml                || { echo "site/sitemap.xml missing"; exit 1; }
          test -f site/robots.txt                 || { echo "site/robots.txt missing"; exit 1; }
          echo "all required files present"

      - name: Validate HTML references
        run: |
          # Fail if any HTML file references the old flat thank-you paths.
          for stale in '"/obrigado.html"' '"/gracias.html"' '"/thank-you.html"' '"/merci.html"'; do
            if grep -r "$stale" site/ --include="*.html" > /dev/null; then
              echo "Found stale $stale references in site/:"
              grep -rn "$stale" site/ --include="*.html"
              exit 1
            fi
          done
          echo "HTML reference validation passed"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=cyberfuturo --branch=main --commit-dirty=true

      - name: Post-deploy smoke test
        run: |
          sleep 5

          # Root must 302 to some language (smart redirect Pages Function).
          root_code=$(curl -sS -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev/")
          if [ "$root_code" != "302" ]; then
            echo "FAIL: / expected 302 (smart redirect), got $root_code"
            exit 1
          fi
          printf "  %-24s %s\n" "/" "302 (redirect as expected)"

          # Each language landing must be 200.
          for path in "/pt/" "/es/" "/en/" "/fr/"; do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev${path}")
            printf "  %-24s %s\n" "$path" "$code"
            if [ "$code" != "200" ]; then
              echo "FAIL: $path returned $code"
              exit 1
            fi
          done

          # Each thank-you page must be 200 (reachable via trailing-slash directory form).
          for path in "/pt/obrigado/" "/es/gracias/" "/en/thank-you/" "/fr/merci/"; do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev${path}")
            printf "  %-24s %s\n" "$path" "$code"
            if [ "$code" != "200" ]; then
              echo "FAIL: $path returned $code"
              exit 1
            fi
          done

          # Each privacy page must be 200.
          for path in "/pt/privacidade/" "/es/privacidad/" "/en/privacy/" "/fr/confidentialite/"; do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev${path}")
            printf "  %-24s %s\n" "$path" "$code"
            if [ "$code" != "200" ]; then
              echo "FAIL: $path returned $code"
              exit 1
            fi
          done

          # Telemetry endpoint CORS preflight is up (returns 204).
          ping_code=$(curl -sS -o /dev/null -w "%{http_code}" -X OPTIONS "https://cyberfuturo.pages.dev/api/ping")
          printf "  %-24s %s\n" "/api/ping OPTIONS" "$ping_code"
          if [ "$ping_code" != "204" ]; then
            echo "FAIL: /api/ping OPTIONS expected 204, got $ping_code"
            exit 1
          fi

          # Accept-Language routing sanity.
          for pair in "es:/es/" "en:/en/" "fr:/fr/" "pt:/pt/"; do
            al="${pair%%:*}"
            expected="${pair##*:}"
            loc=$(curl -sS -o /dev/null -w "%{redirect_url}" -H "Accept-Language: ${al}" "https://cyberfuturo.pages.dev/")
            if [[ "$loc" != *"${expected}" ]]; then
              echo "FAIL: Accept-Language: $al expected redirect to *${expected}, got $loc"
              exit 1
            fi
          done
          echo "all routes green"
