# CyberFuturo — auto-deploy to Cloudflare Pages on every push to main
#
# Install:
#   mkdir -p .github/workflows
#   mv docs/github-workflow-deploy.yml.txt .github/workflows/deploy.yml
#   git add .github/workflows/deploy.yml
#   git commit -m "ci: auto-deploy to Cloudflare Pages on push to main"
#   git push
#
# If `git push` rejects the commit with:
#   "refusing to allow an OAuth App to create or update workflow..."
# then your gh token needs the 'workflow' scope:
#   gh auth refresh -s workflow
#
# Required secrets (set via: gh secret set <NAME>):
#   CLOUDFLARE_API_TOKEN   — token with Account / Cloudflare Pages / Edit permission
#   CLOUDFLARE_ACCOUNT_ID  — 32-char hex, visible in CF dashboard sidebar
#
# See docs/operators-manual.md section 8 for full setup instructions.

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Basic smoke check
        run: |
          test -f site/pt/index.html              || { echo "site/pt/index.html missing"; exit 1; }
          test -f site/es/index.html              || { echo "site/es/index.html missing"; exit 1; }
          test -f site/en/index.html              || { echo "site/en/index.html missing"; exit 1; }
          test -f site/fr/index.html              || { echo "site/fr/index.html missing"; exit 1; }
          test -f site/pt/obrigado/index.html     || { echo "site/pt/obrigado/ missing"; exit 1; }
          test -f site/es/gracias/index.html      || { echo "site/es/gracias/ missing"; exit 1; }
          test -f site/en/thank-you/index.html    || { echo "site/en/thank-you/ missing"; exit 1; }
          test -f site/fr/merci/index.html        || { echo "site/fr/merci/ missing"; exit 1; }
          test -f site/pt/privacidade/index.html      || { echo "site/pt/privacidade/ missing"; exit 1; }
          test -f site/es/privacidad/index.html       || { echo "site/es/privacidad/ missing"; exit 1; }
          test -f site/en/privacy/index.html          || { echo "site/en/privacy/ missing"; exit 1; }
          test -f site/fr/confidentialite/index.html  || { echo "site/fr/confidentialite/ missing"; exit 1; }
          test -f site/pt/comprar/index.html          || { echo "site/pt/comprar/ missing"; exit 1; }
          test -f site/es/comprar/index.html          || { echo "site/es/comprar/ missing"; exit 1; }
          test -f site/en/buy/index.html              || { echo "site/en/buy/ missing"; exit 1; }
          test -f site/fr/acheter/index.html          || { echo "site/fr/acheter/ missing"; exit 1; }
          test -f site/pt/curso/00-bienvenido/index.html   || { echo "site/pt/curso/00-bienvenido/ missing"; exit 1; }
          test -f site/es/curso/00-bienvenido/index.html   || { echo "site/es/curso/00-bienvenido/ missing"; exit 1; }
          test -f site/en/course/00-bienvenido/index.html  || { echo "site/en/course/00-bienvenido/ missing"; exit 1; }
          test -f site/fr/cours/00-bienvenido/index.html   || { echo "site/fr/cours/00-bienvenido/ missing"; exit 1; }
          test -f site/_worker.js                 || { echo "root redirect _worker.js missing"; exit 1; }
          test -f site/styles.css                 || { echo "site/styles.css missing"; exit 1; }
          test -f site/favicon.svg                || { echo "site/favicon.svg missing"; exit 1; }
          test -f site/sitemap.xml                || { echo "site/sitemap.xml missing"; exit 1; }
          test -f site/robots.txt                 || { echo "site/robots.txt missing"; exit 1; }
          echo "all required files present"

      - name: Validate HTML references
        run: |
          # Fail if any HTML file references the old flat thank-you paths.
          for stale in '"/obrigado.html"' '"/gracias.html"' '"/thank-you.html"' '"/merci.html"'; do
            if grep -r "$stale" site/ --include="*.html" > /dev/null; then
              echo "Found stale $stale references in site/:"
              grep -rn "$stale" site/ --include="*.html"
              exit 1
            fi
          done
          echo "HTML reference validation passed"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=cyberfuturo --branch=main --commit-dirty=true

      - name: Post-deploy smoke test
        run: |
          # Give CF edge propagation time — 5s was flaky, 12s eliminates races.
          sleep 12

          # Root must 302 to some language (smart redirect Pages Function).
          root_code=$(curl -sS -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev/")
          if [ "$root_code" != "302" ]; then
            echo "FAIL: / expected 302 (smart redirect), got $root_code"
            exit 1
          fi
          printf "  %-24s %s\n" "/" "302 (redirect as expected)"

          # Each language landing must be 200.
          for path in "/pt/" "/es/" "/en/" "/fr/"; do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev${path}")
            printf "  %-24s %s\n" "$path" "$code"
            if [ "$code" != "200" ]; then
              echo "FAIL: $path returned $code"
              exit 1
            fi
          done

          # Each thank-you page must be 200 (reachable via trailing-slash directory form).
          for path in "/pt/obrigado/" "/es/gracias/" "/en/thank-you/" "/fr/merci/"; do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev${path}")
            printf "  %-24s %s\n" "$path" "$code"
            if [ "$code" != "200" ]; then
              echo "FAIL: $path returned $code"
              exit 1
            fi
          done

          # Each privacy page must be 200.
          for path in "/pt/privacidade/" "/es/privacidad/" "/en/privacy/" "/fr/confidentialite/"; do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev${path}")
            printf "  %-24s %s\n" "$path" "$code"
            if [ "$code" != "200" ]; then
              echo "FAIL: $path returned $code"
              exit 1
            fi
          done

          # Each buy page must be 200.
          for path in "/pt/comprar/" "/es/comprar/" "/en/buy/" "/fr/acheter/"; do
            code=$(curl -sSL -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev${path}")
            printf "  %-24s %s\n" "$path" "$code"
            if [ "$code" != "200" ]; then
              echo "FAIL: $path returned $code"
              exit 1
            fi
          done

          # Buy pages carry the Stripe Payment Link.
          if ! curl -sSL "https://cyberfuturo.pages.dev/pt/comprar/" | grep -q "buy.stripe.com"; then
            echo "FAIL: /pt/comprar/ does not contain the Stripe Payment Link"
            exit 1
          fi

          # Telemetry endpoint CORS preflight is up (returns 204).
          ping_code=$(curl -sS -o /dev/null -w "%{http_code}" -X OPTIONS "https://cyberfuturo.pages.dev/api/ping")
          printf "  %-24s %s\n" "/api/ping OPTIONS" "$ping_code"
          if [ "$ping_code" != "204" ]; then
            echo "FAIL: /api/ping OPTIONS expected 204, got $ping_code"
            exit 1
          fi

          # Product endpoints are wired (503 accepted — D1 binding may be absent pre-provisioning).
          # /auth without token → 400. With DB absent it'd be 503; accept either.
          auth_code=$(curl -sS -o /dev/null -w "%{http_code}" "https://cyberfuturo.pages.dev/auth")
          printf "  %-24s %s\n" "/auth (no token)" "$auth_code"
          case "$auth_code" in 400|503) ;; *) echo "FAIL: /auth expected 400/503, got $auth_code"; exit 1 ;; esac

          # /api/activate with garbage body → 400 or 503. Exercises the handler wiring.
          act_code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "https://cyberfuturo.pages.dev/api/activate" -H "content-type: application/json" --data-raw '{}')
          printf "  %-24s %s\n" "/api/activate ({})" "$act_code"
          case "$act_code" in 400|503) ;; *) echo "FAIL: /api/activate expected 400/503, got $act_code"; exit 1 ;; esac

          # /api/purchase/stripe without signature → 400 or 503 (secret/binding may be absent).
          stripe_code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "https://cyberfuturo.pages.dev/api/purchase/stripe" -H "content-type: application/json" --data-raw '{}')
          printf "  %-24s %s\n" "/api/purchase/stripe" "$stripe_code"
          case "$stripe_code" in 400|503) ;; *) echo "FAIL: /api/purchase/stripe expected 400/503, got $stripe_code"; exit 1 ;; esac

          # Single-call helper: fetch code + redirect_url in one curl so we can't race
          # across edges mid-propagation (bit us on 2026-04-22 with a flaky 301/302 mix).
          # The trailing \n is required — `read` returns 1 on EOF-without-newline, which
          # fires set -e and kills the script silently.
          probe() {
            curl -sS -o /dev/null -w "%{http_code} %{redirect_url}\n" "$1"
          }

          # Cookie gate — non-teaser chapter without cf_access cookie must 302 to buy page.
          read -r curso_code curso_loc < <(probe "https://cyberfuturo.pages.dev/pt/curso/foo/")
          printf "  %-36s %s -> %s\n" "/pt/curso/foo/ (no cookie)" "$curso_code" "$curso_loc"
          if [ "$curso_code" != "302" ] || [[ "$curso_loc" != *"/pt/comprar/"* ]]; then
            echo "FAIL: /pt/curso/foo/ expected 302 to /pt/comprar/, got $curso_code -> $curso_loc"
            exit 1
          fi

          # Teaser chapter — /{lang}/{course}/00-bienvenido/ is now authored (Phase 2)
          # and must return 200, never a redirect to the buy page.
          for path in "/pt/curso/00-bienvenido/" "/es/curso/00-bienvenido/" "/en/course/00-bienvenido/" "/fr/cours/00-bienvenido/"; do
            read -r teaser_code teaser_loc < <(probe "https://cyberfuturo.pages.dev${path}")
            printf "  %-36s %s -> %s\n" "${path} (teaser)" "$teaser_code" "$teaser_loc"
            case "$teaser_loc" in
              *"/comprar/"*|*"/buy/"*|*"/acheter/"*)
                echo "FAIL: teaser chapter $path was gated to buy page (redirected to $teaser_loc)"
                exit 1 ;;
            esac
            if [ "$teaser_code" != "200" ]; then
              echo "FAIL: teaser chapter $path expected 200, got $teaser_code"
              exit 1
            fi
          done

          # Legacy /livro|libro|book|livre/ URLs must 301 to the new /curso|curso|course|cours/ equivalents.
          for pair in "/pt/livro/foo/|/pt/curso/foo/" "/es/libro/foo/|/es/curso/foo/" "/en/book/foo/|/en/course/foo/" "/fr/livre/foo/|/fr/cours/foo/"; do
            src="${pair%%|*}"
            expected="${pair##*|}"
            read -r legacy_code legacy_loc < <(probe "https://cyberfuturo.pages.dev${src}")
            printf "  %-36s %s -> %s\n" "${src} (legacy)" "$legacy_code" "$legacy_loc"
            if [ "$legacy_code" != "301" ] || [[ "$legacy_loc" != *"${expected}"* ]]; then
              echo "FAIL: legacy ${src} expected 301 to ${expected}, got $legacy_code -> $legacy_loc"
              exit 1
            fi
          done

          # Accept-Language routing sanity.
          for pair in "es:/es/" "en:/en/" "fr:/fr/" "pt:/pt/"; do
            al="${pair%%:*}"
            expected="${pair##*:}"
            loc=$(curl -sS -o /dev/null -w "%{redirect_url}" -H "Accept-Language: ${al}" "https://cyberfuturo.pages.dev/")
            if [[ "$loc" != *"${expected}" ]]; then
              echo "FAIL: Accept-Language: $al expected redirect to *${expected}, got $loc"
              exit 1
            fi
          done
          echo "all routes green"
